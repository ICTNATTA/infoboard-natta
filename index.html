<!--
  ISTRUZIONI:
  1. Sostituisci l'URL qui sotto con l'URL /exec della tua web app GAS

  2. L'app DEVE essere deployata come "Anyone" (chiunque)
  3. Il setXFrameOptionsMode(ALLOWALL) nel Code.gs permette l'embedding

  DOVE HOSTARE QUESTA PAGINA:
  a) GitHub Pages (gratuito): crea un repo, carica questo file, attiva Pages
  b) Direttamente nell'URL Launcher del monitor LG webOS Signage
  c) Su una chiavetta USB collegata al monitor (se supporta file locali)
  d) Cloudflare Pages / Netlify / qualsiasi hosting statico gratuito
-->
<iframe
  id="infoboard"
  src="https://script.google.com/a/macros/fondazionebiotecnologie.it/s/AKfycbw1eboqBNjIQ-yAlPW2_AKUrz9Y7PGOCz1QyFD9ndlDSe5_ftNGQMoFw1sjpTpvKXtD/exec"

  sandbox="allow-scripts allow-same-origin allow-popups allow-forms"

</script>
