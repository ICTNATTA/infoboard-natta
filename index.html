<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Info Board — ITS Academy Giulio Natta</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#060A10;
  }
  #infoboard {
    border:none;
    width:1920px;
    height:1080px;
    position:fixed;
    top:0; left:0;
    transform-origin:0 0;
  }
</style>
</head>
<body>
<iframe
  id="infoboard"
  src="https://script.google.com/a/macros/fondazionebiotecnologie.it/s/AKfycbw1eboqBNjIQ-yAlPW2_AKUrz9Y7PGOCz1QyFD9ndlDSe5_ftNGQMoFw1sjpTpvKXtD/exec"
  allow="fullscreen"
  allowfullscreen
  loading="eager">
</iframe>
<script>
// Scala l'iframe 1920x1080 per riempire esattamente lo schermo.
// Il contenuto GAS vive in un viewport fisso 1920x1080, il wrapper
// gestisce lo scaling all'esterno, evitando ogni problema cross-origin.
function scaleIframe() {
  var w = window.innerWidth  || document.documentElement.clientWidth  || screen.width  || 1920;
  var h = window.innerHeight || document.documentElement.clientHeight || screen.height || 1080;
  var sx = w / 1920;
  var sy = h / 1080;
  document.getElementById('infoboard').style.transform = 'scale(' + sx + ',' + sy + ')';
}

// Esegui subito, al resize, e ripeti ogni 2s per i primi 10s
// (i browser signage possono aggiornare le dimensioni in ritardo)
scaleIframe();
window.addEventListener('resize', scaleIframe);
window.addEventListener('load', scaleIframe);
var retryTimer = setInterval(scaleIframe, 2000);
setTimeout(function() { clearInterval(retryTimer); }, 10000);

// Ricarica automatica ogni 12 ore per evitare memory leak
setTimeout(function() { location.reload(); }, 12 * 60 * 60 * 1000);
</script>
</body>
</html>
